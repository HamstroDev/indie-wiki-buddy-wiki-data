# Workflow for generating the JSON data bundle
# and pushing it to the `static` branch
name: Bundle and Deploy

on:
  # Runs on pushes targeting the main branch
  push:
    branches: [main]

  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Create data bundle
        run: python3 bundle.py
      - name: Commit data bundle to static branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: static
          folder: generated
          git-config-name: actions-user
          git-config-email: action@github.com
          commit-message: |
            Auto-deploy data bundle
            Commit: ${{ github.sha }}
